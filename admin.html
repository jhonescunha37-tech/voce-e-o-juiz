<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — Você é o Juiz</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#07080c;color:#f2f2f2;padding:20px}
h1{color:#ffd166;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;color:#888;font-size:14px;margin-bottom:28px}
.card{background:#14161f;border:1px solid #333;border-radius:16px;padding:20px;margin-bottom:20px;max-width:560px;margin-left:auto;margin-right:auto}
.card h2{color:#ffd166;margin-top:0;font-size:18px}
.stat-row{display:flex;justify-content:space-between;align-items:center;margin:8px 0}
.stat-label{color:#ccc;font-size:15px}
.stat-val{font-weight:bold;font-size:16px;color:#f2f2f2}
.bar-wrap{margin:6px 0 14px}
.bar{height:14px;background:#222;border-radius:20px;overflow:hidden}
.fill{height:100%;background:#ffd166;transition:width 0.6s ease}
.fill.green{background:#06d6a0}
.fill.blue{background:#118ab2}
.fill.red{background:#ef476f}
.divider{border:none;border-top:1px solid #2a2a2a;margin:14px 0}
.acesso{font-size:28px;font-weight:bold;color:#ffd166}
.likes-row{display:flex;gap:16px;margin-top:8px}
.like-stat{background:#1e1e22;border-radius:10px;padding:10px 16px;text-align:center;flex:1}
.like-stat span{display:block;font-size:22px}
.like-stat small{color:#888;font-size:12px}
.back{display:inline-block;margin-bottom:20px;padding:10px 20px;background:#222;border:1px solid #444;border-radius:10px;color:#ffd166;text-decoration:none;font-weight:bold}
.loading{text-align:center;color:#888;padding:40px}
.atualizar{display:block;text-align:center;margin:0 auto 24px;padding:10px 28px;background:#ffd166;color:#111;border:none;border-radius:10px;font-weight:bold;font-size:15px;cursor:pointer;max-width:200px}
</style>
</head>
<body>
<a class="back" href="index.html">← Voltar ao site</a>
<h1>📊 Painel de Resultados</h1>
<p class="subtitle">Votos, acessos e curtidas de todas as histórias</p>
<button class="atualizar" onclick="carregarDados()">🔄 Atualizar</button>
<div id="painel"><p class="loading">Carregando dados...</p></div>

<script>
const firebaseConfig={apiKey:"AIzaSyB9RA0dFoE_PlzrcpaqQMsw0aWyBEjVc50",authDomain:"voce-e-o-juiz.firebaseapp.com",projectId:"voce-e-o-juiz",storageBucket:"voce-e-o-juiz.firebasestorage.app",messagingSenderId:"642064514915",appId:"1:642064514915:web:5ac2245b8b5554c38ddd56"};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const historias = [
  { id:"casa17", nome:"O Caso da Casa 17", votos:[{campo:"votoDaniel",label:"Daniel"},{campo:"votoClara",label:"Clara"}], cor:["red","blue"] },
  { id:"passageiro", nome:"O Passageiro da Última Viagem", votos:[{campo:"votoHumano",label:"A verdade era humana"},{campo:"votoSobrenatural",label:"A verdade era sobrenatural"}], cor:["red","blue"] },
  { id:"marcos", nome:"O Caso Marcos Pantera", votos:[{campo:"votoVerdade",label:"Marcos está falando a verdade"},{campo:"votoMentindo",label:"Marcos está mentindo"}], cor:["green","red"] },
  { id:"hexa", nome:"O Hexa Está em Suas Mãos", votos:[{campo:"votoArgentina",label:"🇦🇷 Final contra Argentina"},{campo:"votoAlemanha",label:"🇩🇪 Final contra Alemanha"}], cor:["blue","red"] }
];

function pct(v, tot){ return tot ? Math.round(v/tot*100) : 0; }

async function carregarDados(){
  const painel = document.getElementById("painel");
  painel.innerHTML = '<p class="loading">Carregando...</p>';
  let html = "";
  for(const h of historias){
    try {
      const doc = await db.collection("historias").doc(h.id).get();
      const d = doc.exists ? doc.data() : {};
      const acessos = d.acessos || 0;
      const likes = d.likes || 0;
      const dislikes = d.dislikes || 0;
      const v0 = d[h.votos[0].campo] || 0;
      const v1 = d[h.votos[1].campo] || 0;
      const tot = v0 + v1;
      const p0 = pct(v0, tot), p1 = pct(v1, tot);

      html += `<div class="card">
        <h2>${h.nome}</h2>
        <div class="stat-row"><span class="stat-label">👁 Acessos</span><span class="stat-val acesso">${acessos}</span></div>
        <hr class="divider">
        <div class="stat-row"><span class="stat-label">${h.votos[0].label}</span><span class="stat-val">${v0} (${p0}%)</span></div>
        <div class="bar-wrap"><div class="bar"><div class="fill ${h.cor[0]}" style="width:${p0}%"></div></div></div>
        <div class="stat-row"><span class="stat-label">${h.votos[1].label}</span><span class="stat-val">${v1} (${p1}%)</span></div>
        <div class="bar-wrap"><div class="bar"><div class="fill ${h.cor[1]}" style="width:${p1}%"></div></div></div>
        <div class="stat-row"><span class="stat-label">Total de votos</span><span class="stat-val">${tot}</span></div>
        <hr class="divider">
        <div class="stat-label" style="margin-bottom:8px">Curtidas</div>
        <div class="likes-row">
          <div class="like-stat"><span>👍</span>${likes}<small>curtidas</small></div>
          <div class="like-stat"><span>👎</span>${dislikes}<small>não curtidas</small></div>
          <div class="like-stat"><span>📊</span>${likes+dislikes}<small>total reações</small></div>
        </div>
      </div>`;
    } catch(e) {
      html += `<div class="card"><h2>${h.nome}</h2><p style="color:#888">Erro ao carregar dados.</p></div>`;
    }
  }
  painel.innerHTML = html;
}

carregarDados();
</script>
</body></html>
